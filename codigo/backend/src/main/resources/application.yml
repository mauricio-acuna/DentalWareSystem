spring:
  application:
    name: odonto-backend
  datasource:
    url: ${DB_URL:jdbc:h2:mem:odonto;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: ${H2_CONSOLE:true}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    enabled: ${APP_SECURITY_ENABLED:false}
    jwt-secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
